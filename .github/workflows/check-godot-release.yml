name: Check for new Godot release

on:
  schedule:
    - cron: '14 6 * * 1'
  workflow_dispatch:

# Permissions needed for GHCR manifest check (packages:read) and for calling
# build.yml which requires packages:write, id-token:write, attestations:write
permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.check.outputs.new_version }}
      should_build: ${{ steps.check.outputs.should_build }}

    steps:
      - name: Check for new stable Godot release
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail

          # Fetch recent releases from the godot-builds mirror on GitHub.
          # We filter for non-prerelease entries whose tag ends in "-stable".
          RELEASES=$(curl -sf \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/godotengine/godot-builds/releases?per_page=20")

          LATEST_TAG=$(echo "$RELEASES" | jq -r '
            [.[] | select(.prerelease == false) | select(.tag_name | endswith("-stable"))]
            | first
            | .tag_name
          ')

          if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" = "null" ]; then
            echo "::error::Failed to determine latest stable Godot release"
            exit 1
          fi

          # Strip the "-stable" suffix to get the plain version number (e.g. "4.6.1")
          VERSION="${LATEST_TAG%-stable}"
          echo "Latest stable Godot version: $VERSION"
          echo "new_version=$VERSION" >> "$GITHUB_OUTPUT"

          # Log in to GHCR so we can inspect private/unlisted manifests too
          echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

          # Check whether an image with this version tag already exists
          if docker manifest inspect "ghcr.io/sharkyrawr/godot-docker:$VERSION" > /dev/null 2>&1; then
            echo "ghcr.io/sharkyrawr/godot-docker:$VERSION already exists — no build needed"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "No image found for version $VERSION — triggering build"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    uses: ./.github/workflows/build.yml
    with:
      godot_version: ${{ needs.check.outputs.new_version }}
    secrets: inherit
